{{define "base"}}
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>PhishSim {{block "title" .}}{{end}}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Segoe UI, sans-serif; background: #f5f6fa; color: #2d3436; }
  nav { background: #2d3436; padding: 0 32px; display: flex; align-items: center; gap: 24px; height: 52px; }
  nav a { color: #dfe6e9; text-decoration: none; font-size: 14px; }
  nav a:hover { color: white; }
  nav .brand { color: white; font-weight: 700; font-size: 16px; margin-right: 16px; }
  .page { padding: 32px; max-width: 1100px; margin: auto; }
  h1 { font-size: 22px; margin-bottom: 24px; }
  .btn { display: inline-block; padding: 8px 18px; border-radius: 5px; font-size: 13px;
         text-decoration: none; cursor: pointer; border: none; font-family: inherit; }
  .btn-primary { background: #0067b8; color: white; }
  .btn-primary:hover { background: #005a9e; }
  .btn-danger  { background: #c0392b; color: white; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  table { width: 100%; border-collapse: collapse; background: white;
          border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  th { background: #2d3436; color: white; padding: 10px 14px; text-align: left; font-size: 13px; }
  td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }
  .badge { display:inline-block; padding: 2px 8px; border-radius: 4px;
           font-size: 11px; font-weight: 600; color: white; }
  .badge-draft    { background: #636e72; }
  .badge-active   { background: #0067b8; }
  .badge-completed{ background: #27ae60; }
  .card { background: white; border-radius: 8px; padding: 20px 28px;
          box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 24px; }
  .stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
  .stat { background: white; border-radius: 8px; padding: 18px 24px; flex: 1; min-width: 120px;
          box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .stat .val { font-size: 28px; font-weight: 700; }
  .stat .lbl { font-size: 12px; color: #636e72; margin-top: 2px; }
  input, textarea, select { width: 100%; padding: 8px 10px; border: 1px solid #ddd;
         border-radius: 4px; font-size: 14px; font-family: inherit; margin-top: 4px; }
  label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 12px; }
  .form-row { margin-bottom: 16px; }
  .alert { padding: 10px 16px; border-radius: 5px; margin-bottom: 20px; font-size: 13px; }
  .alert-error { background: #ffeaa7; border-left: 4px solid #fdcb6e; }
</style>
</head>
<body>
<nav>
  <span class="brand">🎣 PhishSim</span>
  <a href="/admin/">Campaigns</a>
  <a href="/admin/new">New Campaign</a>
</nav>
<div class="page">
  {{block "content" .}}{{end}}
</div>
</body>
</html>
{{end}}
